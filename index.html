<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Науково-практичний центр «Фінансова Грамотність» ХНУВС</title>
<style>
    html, body {
        height: 100%;
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #e0f7fa, #ffffff);
        color: #333;
    }
    body {
        display: flex;
        flex-direction: column;
    }

   /* Логотип на всю ширину */
    .logo-full {
        width: 100%;
        background-color: #054873;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 10px;
        box-sizing: border-box;
    }

    .logo-full img {
        width: 100%;
        max-width: 800px; 
        height: auto;
        object-fit: contain;
    }

/* Основний контейнер */
.main {
    display: flex;
    justify-content: center;
    align-items: stretch;
    gap: 40px;
    width: 100%;
    padding: 20px;
    box-sizing: border-box;
    flex: 1;
    flex-wrap: wrap;
}

/* Ліва і права колонки */
.side-images {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 150px; 
    flex: 0 0 auto; /* не розтягувати */
}

/* Плитка */
.image-box {
    width: 140px;
    aspect-ratio: 1 / 1;
    border-radius: 8px;
    overflow: hidden;
    background: transparent;
}

/* Картинки */
.image-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #eee;   
    display: block;
    cursor: pointer;
}

/* Центр */
.text-frame {
    max-width: 500px;
    min-width: 300px;
    padding: 20px;
    border: 2px solid #aaa;
    border-radius: 10px;
    background: rgba(255,255,255,0.9);
    display: block;
    
}

    .text-frame p {
        margin: 0;
    }
    
/* Футер */
    .footer {
        font-size: 14px;
        padding: 15px;
        color: #555;
        margin-bottom: 20px;
        text-align: center;
    }

@media (max-width: 768px) {
    .main {
        flex-direction: column;      /* Вертикальна колонка */
        align-items: center;         /* Центрування по горизонталі */
        padding: 10px;
        gap: 20px;
    }

    .text-frame {
        max-width: 90%;
        min-width: auto;
        padding: 15px;
        order: 1;                    /* Текст під логотипом */
        width: 100%;
    }

    .side-images {
        flex-direction: row;         /* Картинки в ряд */
        gap: 10px;
        order: 2;                    /* Картинки під текстом */
        width: 100%;
        justify-content: center;
        background: transparent;     /* Фон контейнера збігається з фоном сторінки */
        padding: 10px 0;
    }

    .side-images .image-box {
        width: 80px;
        height: 80px;
        font-size: 12px;
        background: transparent;     /* Фон картинки прозорий, видно фон сторінки */
    }

    .side-images .image-box img {
        object-fit: contain;         /* Картинка вписана в квадрат */
        background: transparent;     /* Порожні зони збігаються з фоном сторінки */
    }
}
    

/* затемнення фону */
  #lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

/* велике зображення */
  #lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* курсор */
  .image-box img {
    cursor: pointer;
    transition: 0.3s;
}

.image-box img:hover {
    transform: scale(1.05);
}

</style>
</head>
<body>

<!-- Хедер -->
<div class="logo-full">
    <img src="logo.png" alt="Логотип">
</div>


<!-- Основний блок -->
<div class="main">
    <!-- Ліва колона з картинками -->
    <div class="side-images">
        <div class="image-box"><img src="1.jpg" alt="Фото 1" onclick="openImage(this.src)"></div>
        <div class="image-box"><img src="2.jpg" alt="Фото 2" onclick="openImage(this.src)"></div>
        <div class="image-box"><img src="3.jpg" alt="Фото 3" onclick="openImage(this.src)"></div>
    </div>

    <!-- Середній текстовий блок -->
    <div class="text-frame">
        <p>Сайт знаходиться в розробці. Тут буде інформація про діяльність центру, новини, науково-практичні матеріали та корисні ресурси для фінансової грамотності.</p>
  </div>

    <!-- Права колона з картинками -->
    <div class="side-images">
        <div class="image-box"><img src="4.jpg" alt="Фото 4" onclick="openImage(this.src)"></div>
        <div class="image-box"><img src="5.jpg" alt="Фото 5" onclick="openImage(this.src)"></div>
        <div class="image-box"><img src="6.jpg" alt="Фото 6" onclick="openImage(this.src)"></div>
    </div>
</div>

<div id="lightbox" onclick="closeImage()">
    <img id="lightbox-img" src="">
</div>

<!-- Футер -->
<div class="footer">&copy; 2026 ХНУВС, Науково-практичний центр «Фінансова Грамотність»</div>

<script>
function openImage(src) {
    document.getElementById('lightbox').style.display = 'flex';
    document.getElementById('lightbox-img').src = src;
}

function closeImage() {
    document.getElementById('lightbox').style.display = 'none';
}
</script>

</body>
</html>
